<!-- CONTAINER PRINCIPAL -->
<div class="min-h-screen flex items-center justify-center p-6">
    
    <!-- ÉCRAN DE DÉPART (Ta page que tu aimes) -->
    <div id="screen-ready" class="max-w-lg w-full glass rounded-[50px] p-10 text-center shadow-2xl">
        <h1 class="text-5xl font-black mb-4 tracking-tighter bg-gradient-to-br from-violet-600 to-fuchsia-500 bg-clip-text text-transparent">
            ZenHertz
        </h1>
        <p class="text-gray-500 font-medium mb-10 leading-relaxed">
            Découvrez l'impact invisible de votre musique sur votre <span class="text-violet-600">système nerveux</span> et vos <span class="text-fuchsia-500">ondes cérébrales</span>.
        </p>

        <label class="cursor-pointer group">
            <div class="bg-black text-white p-8 rounded-[40px] border-2 border-transparent group-hover:border-violet-500 transition-all duration-500">
                <div class="bg-white/10 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="text-2xl">＋</span>
                </div>
                <p class="font-bold text-lg">Analyser un morceau</p>
                <p class="text-[10px] opacity-40 uppercase tracking-widest mt-1">MP3, WAV, AAC</p>
            </div>
            <input type="file" id="audio-input" class="hidden" accept="audio/*">
        </label>
    </div>

    <!-- ÉCRAN ANALYSE (Loading) -->
    <div id="screen-analyzing" class="hidden max-w-lg w-full glass rounded-[50px] p-16 text-center shadow-2xl">
        <div class="relative w-24 h-24 mx-auto mb-8">
            <div class="absolute inset-0 border-4 border-violet-100 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-violet-600 rounded-full border-t-transparent animate-spin"></div>
        </div>
        <h2 class="text-2xl font-black text-gray-800 animate-pulse">Scan en cours...</h2>
        <p id="loading-step" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-4">Extraction des fréquences</p>
    </div>

    <!-- ÉCRAN RÉSULTAT (Le nouveau moteur avec ton style) -->
    <div id="screen-result" class="hidden max-w-lg w-full glass rounded-[50px] p-10 text-center shadow-2xl">
        <div class="mb-8">
            <h2 id="res-name" class="text-xl font-bold text-gray-800 tracking-tight">Analyse terminée</h2>
            <div class="h-1 w-12 bg-violet-600 mx-auto mt-2 rounded-full"></div>
        </div>
        
        <div class="grid grid-cols-3 gap-2 bg-white/50 border border-white p-6 rounded-[35px] mb-8 shadow-sm">
            <div class="text-center">
                <p id="res-bpm" class="text-4xl font-black text-gray-900 leading-none">0</p>
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-2">BPM</p>
            </div>
            <div class="text-center border-x border-gray-100">
                <p id="res-hz" class="text-4xl font-black text-violet-600 leading-none">0</p>
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-2">Hertz</p>
            </div>
            <div class="text-center">
                <p id="res-wave" class="text-xl font-black text-gray-900 leading-none pt-2 uppercase">--</p>
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-3">Ondes</p>
            </div>
        </div>

        <div class="bg-black p-6 rounded-[35px] text-white flex justify-between items-center mb-6">
            <div class="text-left">
                <p class="font-bold text-sm">Bilan Bioacoustique</p>
                <p class="text-[9px] opacity-50 uppercase font-bold tracking-tighter">Impact cellulaire complet</p>
            </div>
            <div class="bg-violet-600 px-5 py-2 rounded-full text-[11px] font-black shadow-lg">2.99€</div>
        </div>
        
        <button onclick="location.reload()" class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em]">Retour</button>
    </div>

</div>
