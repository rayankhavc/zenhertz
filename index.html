<!DOCTYPE html>
<html lang="fr" data-theme="light" data-lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenHertz</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eeeef5;--glass:rgba(255,255,255,0.75);--glass-b:rgba(255,255,255,0.55);
  --t1:#111827;--t2:#4b5563;--t3:#9ca3af;
  --card:rgba(255,255,255,0.65);--card-b:rgba(255,255,255,0.9);
  --sci:rgba(124,58,237,0.07);--sci-b:rgba(124,58,237,0.18);
  --div:#e5e7eb;--dis:rgba(0,0,0,0.04);--dis-t:#9ca3af;--shadow:0 8px 40px rgba(0,0,0,.09);
  --blob1:rgba(124,58,237,0.22);--blob2:rgba(168,85,247,0.15);--blob3:rgba(99,102,241,0.12);
}
[data-theme="dark"]{
  --bg:#04040e;--glass:rgba(8,8,22,0.92);--glass-b:rgba(124,58,237,0.20);
  --t1:#eef0ff;--t2:#94a3b8;--t3:#4b5563;
  --card:rgba(255,255,255,0.04);--card-b:rgba(255,255,255,0.07);
  --sci:rgba(124,58,237,0.16);--sci-b:rgba(124,58,237,0.30);
  --div:rgba(255,255,255,0.08);--dis:rgba(255,255,255,0.03);--dis-t:#4b5563;
  --shadow:0 8px 40px rgba(0,0,0,.5);
  --blob1:rgba(124,58,237,0.28);--blob2:rgba(168,85,247,0.20);--blob3:rgba(99,102,241,0.16);
}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;transition:background .35s,color .35s;color:var(--t1)}

/* MESH */
#mesh{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(100px);transition:transform 3s cubic-bezier(.25,.46,.45,.94)}
#b1{width:800px;height:800px;background:radial-gradient(circle,var(--blob1),transparent 70%);top:-200px;left:-200px;animation:bf1 18s ease-in-out infinite}
#b2{width:700px;height:700px;background:radial-gradient(circle,var(--blob2),transparent 70%);bottom:-150px;right:-150px;animation:bf2 22s ease-in-out infinite}
#b3{width:600px;height:600px;background:radial-gradient(circle,var(--blob3),transparent 70%);top:45%;left:45%;animation:bf3 16s ease-in-out infinite}
@keyframes bf1{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,-30px)}66%{transform:translate(-25px,45px)}}
@keyframes bf2{0%,100%{transform:translate(0,0)}40%{transform:translate(-35px,25px)}80%{transform:translate(30px,-40px)}}
@keyframes bf3{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(calc(-50% + 30px),calc(-50% + 20px))}}

/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.75rem;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--div);background:rgba(238,238,245,.55)}
[data-theme="dark"] #topbar{background:rgba(4,4,14,.7)}
.tbtn{display:flex;align-items:center;gap:.35rem;font-size:.7rem;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:.4rem .85rem;border-radius:50px;border:1px solid var(--div);background:var(--glass);backdrop-filter:blur(8px);transition:all .2s;user-select:none}
.tbtn:hover{color:var(--t1);border-color:rgba(124,58,237,.5);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.tright{display:flex;gap:.5rem}

/* GLASS */
.glass{background:var(--glass);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid var(--glass-b);border-radius:36px;box-shadow:var(--shadow)}

/* SCREENS */
.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:6rem 1.5rem 3rem}

/* URL INPUT */
.url-wrap{display:flex;gap:.5rem;margin-bottom:1rem}
.url-input{flex:1;background:var(--card);border:1px solid var(--div);border-radius:16px;padding:.75rem 1rem;font-size:.82rem;color:var(--t1);font-family:'Inter',sans-serif;outline:none;transition:all .25s}
.url-input::placeholder{color:var(--t3)}
.url-input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.12)}
[data-theme="dark"] .url-input{background:rgba(255,255,255,0.06)}
.url-btn{background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;border:none;border-radius:14px;padding:.75rem 1.1rem;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;box-shadow:0 4px 16px rgba(124,58,237,.3)}
.url-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,.45)}
.url-btn:active{transform:translateY(0)}

/* DIVIDER */
.or-line{display:flex;align-items:center;gap:.75rem;margin:.85rem 0;color:var(--t3);font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.or-line::before,.or-line::after{content:'';flex:1;height:1px;background:var(--div)}

/* UPLOAD */
.uzone{border:1.5px dashed rgba(124,58,237,.3);border-radius:28px;padding:2rem 1.5rem;text-align:center;cursor:pointer;transition:all .3s;background:rgba(124,58,237,.03)}
.uzone:hover{border-color:#7c3aed;background:rgba(124,58,237,.07);transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,58,237,.12)}
.uico{width:48px;height:48px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto .85rem;box-shadow:0 6px 20px rgba(124,58,237,.3)}
.uico svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}

/* ALERT */
#alert-box{display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:14px;padding:.7rem 1rem;margin-top:.75rem}
#alert-box p{font-size:.75rem;color:#b91c1c;font-weight:600;text-align:center}
[data-theme="dark"] #alert-box p{color:#fca5a5}

/* SPINNER */
.spin{width:52px;height:52px;border:3px solid rgba(124,58,237,.15);border-top-color:#7c3aed;border-radius:50%;animation:rot .85s linear infinite;margin:0 auto 1.5rem}
@keyframes rot{to{transform:rotate(360deg)}}

/* METRICS */
.mgrid{display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;background:var(--card);border:1px solid var(--card-b);border-radius:26px;padding:1.6rem 1rem;margin:1.4rem 0}
.mdiv{background:var(--div)}
.mv{font-size:2.4rem;font-weight:900;letter-spacing:-2px;line-height:1;color:var(--t1)}
.mv.a{color:#7c3aed}.mv.sm{font-size:1.25rem;letter-spacing:-.4px;padding-top:.35rem}
.ml{font-size:.58rem;font-weight:700;color:var(--t3);letter-spacing:.2em;text-transform:uppercase;margin-top:.75rem}

/* SCIENCE BOX */
.sbox{background:var(--sci);border:1px solid var(--sci-b);border-radius:22px;padding:1.1rem 1.3rem;margin-bottom:1rem}
.wbar{display:flex;gap:4px;margin:.7rem 0 .2rem}
.ws{height:6px;border-radius:3px;flex:1;opacity:.2;transition:opacity .5s,transform .35s}
.ws.on{opacity:1;transform:scaleY(1.6)}
.wlbl{display:flex;justify-content:space-between;font-size:.58rem;color:var(--t3);font-weight:600;letter-spacing:.04em}
.stitle{font-size:.62rem;font-weight:800;color:var(--t3);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.8rem}

/* TYPEWRITER */
.tw{font-size:.79rem;color:var(--t2);line-height:1.7;min-height:72px}
.cur{display:inline-block;width:2px;height:.85em;background:#7c3aed;margin-left:1px;animation:blink .65s step-end infinite;vertical-align:-.1em}
@keyframes blink{50%{opacity:0}}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:.8rem}
.tag{font-size:.68rem;font-weight:700;padding:.28rem .7rem;border-radius:50px;background:rgba(124,58,237,.1);color:#6d28d9;border:1px solid rgba(124,58,237,.2)}
.tag.w{background:rgba(239,68,68,.08);color:#b91c1c;border-color:rgba(239,68,68,.2)}
.tag.s{background:rgba(16,185,129,.08);color:#065f46;border-color:rgba(16,185,129,.2)}

/* FATIGUE */
.fbar{height:4px;border-radius:2px;background:var(--div);margin-top:.8rem;overflow:hidden}
.ffill{height:100%;border-radius:2px;transition:width 1.3s ease}

/* HORMONE PANEL */
.hpanel{background:var(--glass);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid var(--glass-b);border-radius:32px;padding:1.5rem 1.6rem;box-shadow:var(--shadow)}
.hitem{margin-bottom:1.1rem}.hitem:last-child{margin-bottom:0}
.hrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.32rem}
.hname{font-size:.78rem;font-weight:700;color:var(--t1)}
.hdesc{font-size:.6rem;color:var(--t3);font-weight:500;margin-left:.3rem}
.hval{font-size:.72rem;font-weight:800;color:var(--t2)}
.hlvl{font-size:.58rem;font-weight:500;color:var(--t3)}
.hbg{height:5px;border-radius:3px;background:var(--div);overflow:hidden}
.hfill{height:100%;border-radius:3px;width:0%;transition:width 1.5s cubic-bezier(.34,1.56,.64,1)}

/* DISC & BUTTONS */
.disc{background:var(--dis);border-radius:14px;padding:.7rem 1rem}
.disc p{font-size:.66rem;color:var(--dis-t);line-height:1.55;text-align:center}
.logo{font-size:2.75rem;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#7c3aed,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.backbtn{display:block;text-align:center;font-size:.68rem;font-weight:800;color:var(--t3);letter-spacing:.22em;text-transform:uppercase;cursor:pointer;padding:.55rem;transition:color .2s}
.backbtn:hover{color:var(--t1)}

/* BOUTON PARTAGER */
.sharebtn{display:flex;align-items:center;gap:.4rem;font-size:.68rem;font-weight:800;color:white;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:.55rem 1.2rem;border-radius:50px;background:linear-gradient(135deg,#7c3aed,#a855f7);transition:transform .2s,box-shadow .2s;box-shadow:0 4px 15px rgba(124,58,237,.3)}
.sharebtn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.45)}

/* HEARTBEAT */
.hbring{width:60px;height:60px;border-radius:50%;border:2px solid rgba(124,58,237,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 1.1rem}
.hbdot{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7)}
@keyframes heartbeat{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(124,58,237,.45)}50%{transform:scale(1.22);box-shadow:0 0 0 10px rgba(124,58,237,0)}}

/* PROGRESS BAR FALLBACK */
.pbar-wrap{width:100%;background:rgba(124,58,237,.1);border-radius:50px;height:5px;margin:1.4rem 0 .5rem;overflow:hidden}
.pbar-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,#7c3aed,#a855f7);width:0%;transition:width .8s ease}
#pbar-msg{font-size:.67rem;color:var(--t3);font-style:italic;min-height:1em;transition:opacity .3s}

/* LAYOUT */
.result-page{min-height:100vh;padding:5.5rem 2rem 3rem;display:flex;justify-content:center;align-items:flex-start}
#rwrap{width:100%;max-width:1080px;border-radius:36px;} /* Ajout border-radius pour la capture */
@media(min-width:768px){#rwrap{display:grid;grid-template-columns:1.1fr 1fr;gap:1.5rem;align-items:start}}
@media(max-width:767px){#rwrap{max-width:440px;margin:0 auto}#rright{margin-top:1rem}}

.fade{animation:fi .45s ease forwards}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none}
</style>
</head>
<body>

<div id="mesh"><div class="blob" id="b1"></div><div class="blob" id="b2"></div><div class="blob" id="b3"></div></div>

<div id="topbar">
  <button class="tbtn" id="home-btn" onclick="goHome()" style="display:none">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span data-i="homeBtn">Accueil</span>
  </button>
  <div style="flex:1"></div>
  <div class="tright">
    <button class="tbtn" onclick="toggleLang()"><span id="llbl">FR</span></button>
    <button class="tbtn" onclick="toggleTheme()" id="thbtn">🌙</button>
  </div>
</div>

<div id="sc-ready" class="screen">
  <div class="glass fade" style="max-width:440px;width:100%;padding:2.5rem 2rem">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div class="logo">ZenHertz</div>
      <p style="color:var(--t2);font-size:.84rem;line-height:1.65;margin-top:.4rem" data-i="tagline">
        Découvrez l'impact de votre musique sur votre <span style="color:#7c3aed;font-weight:600">système nerveux</span> et vos <span style="color:#a855f7;font-weight:600">ondes cérébrales</span>.
      </p>
    </div>

    <div class="url-wrap">
      <input type="text" id="url-input" class="url-input" data-i-ph="urlph">
      <button class="url-btn" onclick="triggerAnalyzeLink()" data-i="urlbtn">→</button>
    </div>

    <div id="alert-box"><p id="alert-msg"></p></div>

    <div class="or-line"><span data-i="orLabel">ou</span></div>

    <label style="cursor:pointer;display:block">
      <div class="uzone">
        <div class="uico">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <p style="font-size:.92rem;font-weight:600;color:var(--t1)" data-i="uplbl">Analyser un fichier</p>
        <p style="font-size:.65rem;color:var(--t3);letter-spacing:.15em;text-transform:uppercase;margin-top:.4rem;font-weight:500">MP3 · WAV · AAC · FLAC · MP4 · MOV</p>
      </div>
      <input type="file" id="audio-input" style="display:none" accept="audio/*,video/mp4,video/quicktime,video/*">
    </label>

    <div style="margin-top:1.4rem;display:grid;grid-template-columns:1fr 1fr 1fr;gap:.65rem;text-align:center">
      <div style="background:rgba(124,58,237,.06);border-radius:14px;padding:.75rem .4rem"><p style="font-size:1rem;color:#7c3aed;margin-bottom:.2rem">⏱</p><p style="font-size:.62rem;font-weight:700;color:var(--t2)">BPM</p></div>
      <div style="background:rgba(124,58,237,.06);border-radius:14px;padding:.75rem .4rem"><p style="font-size:1rem;color:#7c3aed;margin-bottom:.2rem">〰️</p><p style="font-size:.62rem;font-weight:700;color:var(--t2)">Hz</p></div>
      <div style="background:rgba(124,58,237,.06);border-radius:14px;padding:.75rem .4rem"><p style="font-size:1rem;color:#7c3aed;margin-bottom:.2rem">🧠</p><p style="font-size:.62rem;font-weight:700;color:var(--t2)" data-i="wlbl">Ondes</p></div>
    </div>
  </div>
</div>

<div id="sc-analyzing" class="screen hidden">
  <div class="glass fade" style="max-width:430px;width:100%;padding:3.5rem 2rem;text-align:center">
    <div class="spin"></div>
    <p id="scan-title" style="font-size:1.1rem;font-weight:700;color:var(--t1);letter-spacing:-.4px"></p>
    <p id="scan-sub" style="font-size:.68rem;color:var(--t3);letter-spacing:.25em;text-transform:uppercase;margin-top:.7rem;font-weight:600"></p>
    <div class="pbar-wrap hidden" id="pbar-wrap"><div class="pbar-fill" id="pbar-fill"></div></div>
    <p id="pbar-msg"></p>
  </div>
</div>

<div id="sc-result" class="result-page hidden fade">
  <div id="rwrap">
    <div class="glass" id="rleft" style="padding:2rem 1.75rem">
      <div class="hbring"><div class="hbdot" id="hbdot"></div></div>
      <div style="text-align:center;margin-bottom:1.2rem">
        <p id="rname" style="font-size:1rem;font-weight:700;color:var(--t1);letter-spacing:-.3px;word-break:break-word;line-height:1.35"></p>
        <div style="height:3px;width:44px;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:2px;margin:.55rem auto 0"></div>
      </div>
      <div class="mgrid">
        <div style="text-align:center"><p id="rbpm" class="mv">—</p><p class="ml">BPM</p></div>
        <div class="mdiv"></div>
        <div style="text-align:center"><p id="rhz" class="mv a">—</p><p class="ml">Hertz</p></div>
        <div class="mdiv"></div>
        <div style="text-align:center"><p id="rwave" class="mv sm">—</p><p class="ml" data-i="wlbl">Onde</p></div>
      </div>
      <div class="sbox">
        <p class="stitle" data-i="neuroprofile">Profil Neuro-acoustique</p>
        <div class="wbar">
          <div id="wd" class="ws" style="background:#818cf8"></div>
          <div id="wt" class="ws" style="background:#a78bfa"></div>
          <div id="wa" class="ws" style="background:#7c3aed"></div>
          <div id="wb" class="ws" style="background:#c084fc"></div>
          <div id="wg" class="ws" style="background:#e879f9"></div>
        </div>
        <div class="wlbl"><span>Delta</span><span>Thêta</span><span>Alpha</span><span>Bêta</span><span>Gamma</span></div>
        <div id="rdesc" class="tw" style="margin-top:.8rem"></div>
        <div class="tags" id="rtags"></div>
        <div class="fbar"><div class="ffill" id="ffill"></div></div>
        <p id="flbl" style="font-size:.67rem;margin-top:.38rem;font-weight:600"></p>
      </div>
      <div class="disc" style="margin-bottom:1.2rem"><p data-i="disclaimer"></p></div>
      
      <div style="display:flex; gap:1rem; align-items:center; justify-content:center; flex-wrap:wrap;">
        <span class="backbtn" onclick="goHome()" data-i="back">← Analyser un autre morceau</span>
        <div class="sharebtn" id="btn-share" onclick="captureBilan()">📸 <span data-i="share">Partager</span></div>
      </div>
    </div>
    <div id="rright" style="display:flex;flex-direction:column;gap:1.2rem">
      <div class="hpanel">
        <p class="stitle" data-i="hormones">Tableau Hormonal Estimé</p>
        <div id="hgauges"></div>
      </div>
    </div>
  </div>
</div>

function typeWords(el,html,ms=75){
  const tmp=document.createElement('div'); tmp.innerHTML=html;
  const words=tmp.textContent.split(' ');
  let i=0; el.textContent='';
  const cur=document.createElement('span'); cur.className='cur'; el.appendChild(cur);
  function next(){
    if(i<words.length){
      const tn=document.createTextNode(words.slice(0,i+1).join(' ')+' ');
      el.childNodes[0]?.nodeType===3?el.childNodes[0].replaceWith(tn):el.insertBefore(tn,cur);
      i++; setTimeout(next,ms+Math.random()*28);
    } else { el.innerHTML=html; }
  }
  next();
}

function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

function generateNeuroAnalysis(bpm,hertz,wt){
  const vB=bpm>0&&isFinite(bpm), vH=hertz>0&&isFinite(hertz);
  const D=ANALYSIS[lang]||ANALYSIS.fr;
  const bCat=vB?(bpm<80?'slow':bpm<115?'medium':'fast'):'medium';
  const hCat=vH?(hertz<500?'veryLow':hertz<1500?'low':hertz<4000?'mid':'high'):'mid';
  const b=pick(D.bpm[bCat]).replaceAll('%B%',bpm);
  const h=pick(D.hz[hCat]).replaceAll('%H%',hertz.toLocaleString());
  const c=L('conclus')[wt]||'';
  return `${b} ${h}<br><br><strong style="color:#7c3aed">${L('conseil')} :</strong> ${c}`;
}

function generateTags(bpm,hz,wt){
  const vB=bpm>0&&isFinite(bpm),vH=hz>0&&isFinite(hz);
  const T=L('tags'); const out=[];
  if(wt==='delta')out.push({k:'sleep',t:'s'});
  if(wt==='theta')out.push({k:'meditate',t:'s'},{k:'create',t:''});
  if(wt==='alpha')out.push({k:'focus',t:''},{k:'cardiac',t:'s'});
  if(wt==='beta') out.push({k:'active',t:''},{k:'perf',t:''});
  if(wt==='gamma')out.push({k:'hstim',t:'w'},{k:'cogn',t:''});
  if(vB&&bpm<80)  out.push({k:'vagus',t:'s'});
  if(vB&&bpm>130) out.push({k:'sport',t:''});
  if(vH&&hz>3000) out.push({k:'fatigue',t:'w'});
  if(vH&&hz<600)  out.push({k:'vibra',t:'s'});
  return out.slice(0,4).map(o=>`<span class="tag ${o.t}">${T[o.k]}</span>`).join('');
}

function fatigueScore(bpm,hz){let s=0;if(bpm>140)s+=40;else if(bpm>110)s+=20;if(hz>3000)s+=40;else if(hz>1500)s+=20;return Math.min(s,100);}

const HCOL={dopamine:'linear-gradient(90deg,#7c3aed,#a855f7)',cortisol:'linear-gradient(90deg,#f59e0b,#ef4444)',serotonin:'linear-gradient(90deg,#10b981,#059669)',melatonin:'linear-gradient(90deg,#6366f1,#4338ca)',endorphins:'linear-gradient(90deg,#ec4899,#db2777)',noradr:'linear-gradient(90deg,#f59e0b,#d97706)'};

function calcHormones(bpm,hz){
  const b=bpm>0&&isFinite(bpm)?bpm:100,h=hz>0&&isFinite(hz)?hz:1200;
  let d=18;if(b>=95&&b<=145)d+=Math.min(52,(b-95)*1.05);else if(b>145)d+=Math.max(0,52-(b-145)*.8);if(h>=900&&h<=3800)d+=20;else if(h>3800)d+=8;
  let c=12;if(b>125)c+=Math.min(55,(b-125)*1.4);if(h>2800)c+=Math.min(28,(h-2800)/110);
  let s=18;if(b>=72&&b<=118)s+=42;else if(b<72)s+=28;else if(b>118&&b<150)s+=Math.max(0,42-(b-118)*1.2);if(h<1600)s+=22;else if(h<3200)s+=8;
  let m=8;if(b<82)m+=Math.min(58,(82-b)*1.6);if(h<900)m+=22;else if(h<1600)m+=9;if(b>120)m=Math.max(4,m-(b-120)*.7);
  let e=14;if(b>128)e+=Math.min(48,(b-128)*1.1);if(b<68)e+=32;if(h<700)e+=18;
  let n=10;if(b>138)n+=Math.min(58,(b-138)*1.6);if(h>3200)n+=22;
  const cap=v=>Math.round(Math.min(95,v));
  return{dopamine:cap(d),cortisol:cap(c),serotonin:cap(s),melatonin:cap(m),endorphins:cap(e),noradr:cap(n)};
}

function renderHormones(bpm,hz){
  const vals=calcHormones(bpm,hz);const hl=L('h');const lvls=L('hlvl');
  S('hgauges').innerHTML=Object.entries(vals).map(([k,v])=>{
    const info=hl[k]||[k,''];const lvl=v<35?lvls[0]:v<65?lvls[1]:lvls[2];
    const tr=v>=65?'↑':v<=34?'↓':'→';
    return`<div class="hitem"><div class="hrow"><div><span class="hname">${info[0]}</span><span class="hdesc">${info[1]}</span></div><span class="hval">${v}% <span class="hlvl">${tr} ${lvl}</span></span></div><div class="hbg"><div class="hfill" style="background:${HCOL[k]}" data-w="${v}"></div></div></div>`;
  }).join('');
  setTimeout(()=>S('hgauges').querySelectorAll('.hfill').forEach(el=>el.style.width=el.dataset.w+'%'),60);
}

/* ══════════════════════════════════
   AUDIO ENGINE — NE PAS MODIFIER
══════════════════════════════════ */
async function processArrayBuffer(ab, label){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const buf=await ctx.decodeAudioData(ab);
  // getChannelData D'ABORD, ctx.close() ensuite — sinon tue le décodage sur certains codecs MP4
  const sr=buf.sampleRate, durFull=buf.duration;
  const rawData=buf.getChannelData(0);
  ctx.close();
  const data=rawData.subarray(0,Math.min(rawData.length,Math.floor(90*sr)));
  const dur=Math.min(durFull,90);

  // ── BPM VALIDÉ ──
  const scan=Math.min(data.length,sr*60);
  let maxV=0;for(let i=0;i<scan;i++)if(Math.abs(data[i])>maxV)maxV=Math.abs(data[i]);
  function getBPM(tm){
    let peaks=[],thr=maxV*tm;
    for(let i=0;i<scan;i++)if(data[i]>thr){peaks.push(i);i+=sr*0.28;}
    if(peaks.length<5)return 0;
    let iv={};for(let i=1;i<peaks.length;i++){let x=Math.round((peaks[i]-peaks[i-1])/150)*150;iv[x]=(iv[x]||0)+1;}
    let mc=0,bi=0;for(let k in iv)if(iv[k]>mc){mc=iv[k];bi=k;}
    return bi>0?Math.round(60/(bi/sr)):0;
  }
  let bpm=getBPM(0.85);if(!bpm)bpm=getBPM(0.60);
  if(bpm>0&&bpm<85)bpm*=2;if(bpm>200)bpm=Math.round(bpm/2);

  // ── HZ VALIDÉ ──
  let zc=0,pos=data[0]>0;
  for(let i=1;i<data.length;i++){
    if(pos&&data[i]<-0.002)pos=false;
    else if(!pos&&data[i]>0.002){pos=true;zc++;}
  }
  const hz=Math.round(zc/dur);

  setTimeout(()=>showResults(bpm,hz,label),800);
}

function startProgressBar(durationSec){
  const wrap=document.getElementById('pbar-wrap');
  const fill=document.getElementById('pbar-fill');
  const msg=document.getElementById('pbar-msg');
  const msgs=WAVE_MSGS[lang]||WAVE_MSGS.fr;
  wrap.classList.remove('hidden');
  fill.style.width='0%';
  msg.textContent=msgs[0];

  let elapsed=0;
  let msgIdx=0;
  const interval=setInterval(()=>{
    elapsed+=1;
    const pct=Math.min(96, Math.round((elapsed/durationSec)*100));
    fill.style.width=pct+'%';
    // Change le texte toutes les ~8s
    const newIdx=Math.min(msgs.length-1, Math.floor(elapsed/8));
    if(newIdx!==msgIdx){
      msgIdx=newIdx;
      msg.style.opacity='0';
      setTimeout(()=>{msg.textContent=msgs[msgIdx];msg.style.opacity='1';},300);
    }
  },1000);

  return {
    stop(){
      clearInterval(interval);
      fill.style.width='100%';
      msg.textContent='';
      setTimeout(()=>wrap.classList.add('hidden'),600);
    }
  };
}

// Fallback : capture audio via MediaElementSource sur un <video> invisible
function processViaVideoElement(file, label){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file);
    const video=document.createElement('video');
    video.src=url;
    video.preload='auto';
    video.muted=false;
    video.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px';
    document.body.appendChild(video);

    video.addEventListener('error',()=>{
      URL.revokeObjectURL(url);
      try{document.body.removeChild(video);}catch{}
      reject(new Error('video_load_error'));
    });

    video.addEventListener('canplaythrough',async()=>{
      try{
        const durSec=Math.min(video.duration||90, 90);
        // Lance la barre de progression
        const progress=startProgressBar(durSec);

        const AC=window.AudioContext||window.webkitAudioContext;
        const liveCtx=new AC();
        const liveSrc=liveCtx.createMediaElementSource(video);
        const dest=liveCtx.createMediaStreamDestination();
        liveSrc.connect(dest);

        const chunks=[];
        const recorder=new MediaRecorder(dest.stream);
        recorder.ondataavailable=ev=>{if(ev.data.size>0)chunks.push(ev.data);};
        recorder.onstop=async()=>{
          progress.stop();
          liveCtx.close();
          URL.revokeObjectURL(url);
          try{document.body.removeChild(video);}catch{}
          const blob=new Blob(chunks,{type:'audio/webm'});
          const ab=await blob.arrayBuffer();
          try{await processArrayBuffer(ab,label);resolve();}
          catch(e){reject(e);}
        };

        recorder.start();
        video.currentTime=0;
        await video.play();
        setTimeout(()=>{recorder.stop();video.pause();}, durSec*1000);

      }catch(e){
        URL.revokeObjectURL(url);
        try{document.body.removeChild(video);}catch{}
        reject(e);
      }
    },{once:true});

    video.load();
  });
}

/* ══ URL ANALYSIS ══ */
function triggerAnalyzeLink(){
  const url=S('url-input').value.trim();
  if(!url){showAlert(L('errEmpty'));return;}
  hideAlert();
  analyzeLink(url);
}

S('url-input').addEventListener('keydown',e=>{if(e.key==='Enter')triggerAnalyzeLink();});

async function analyzeLink(url){
  S('sc-ready').classList.add('hidden');
  S('sc-analyzing').classList.remove('hidden');
  S('scan-title').textContent=L('extracting');
  S('scan-sub').textContent=L('extractsub');
  S('home-btn').style.display='flex';

  // Instances Cobalt tentées en cascade
  const COBALT=[
    'https://cobalt-api.v0l.io/',
    'https://cobalt.api.timkodiert.de/',
    'https://api.cobalt.tools/',
  ];

  let audioUrl=null;
  for(const inst of COBALT){
    try{
      const r=await fetch(inst,{
        method:'POST',
        headers:{'Accept':'application/json','Content-Type':'application/json'},
        body:JSON.stringify({url,downloadMode:'audio',audioFormat:'mp3',filenameStyle:'basic'}),
        signal:AbortSignal.timeout(9000)
      });
      if(!r.ok) continue;
      const d=await r.json();
      const u=d.url||d.tunnel;
      if(u){audioUrl=u;break;}
    }catch(e){console.warn('[Cobalt]',inst,e.message);}
  }

  if(!audioUrl){
    S('sc-analyzing').classList.add('hidden');
    S('sc-ready').classList.remove('hidden');
    S('home-btn').style.display='none';
    showAlert(L('errLink'));
    return;
  }

  S('scan-title').textContent=L('scanning');
  S('scan-sub').textContent=L('analyzinglbl');

  // Fetch audio : direct puis proxies CORS
  const PROXIES=[
    u=>u,
    u=>'https://corsproxy.io/?'+encodeURIComponent(u),
    u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
  ];

  let ab=null;
  for(const makeUrl of PROXIES){
    try{
      const r=await fetch(makeUrl(audioUrl),{signal:AbortSignal.timeout(20000)});
      if(!r.ok) continue;
      const buf=await r.arrayBuffer();
      if(buf.byteLength>1000){ab=buf;break;}
    }catch(e){console.warn('[fetch]',e.message);}
  }

  if(!ab){
    S('sc-analyzing').classList.add('hidden');
    S('sc-ready').classList.remove('hidden');
    S('home-btn').style.display='none';
    showAlert(L('errLink'));
    return;
  }

  let label='Audio';
  try{const u=new URL(url);label=u.hostname.replace('www.','')+' — '+u.pathname.split('/').filter(Boolean).pop();}catch{}
  await processArrayBuffer(ab,label);
}

let cachedShareCanvas=null;

/* ══ CAPTURE BILAN (SHARE) ══ */
async function captureBilan(){
  const btn=S('btn-share');
  const originalHTML=btn.innerHTML;
  btn.innerHTML=`📸 <span>${L('capturing')}</span>`;

  try{
    let canvas=cachedShareCanvas;

    // Si le canvas pré-généré est dispo → on l'utilise directement (share immédiat)
    // Sinon → on le génère maintenant (cas rare : clic très rapide)
    if(!canvas){
      const target=S('rwrap');
      const actionsDiv=target.querySelector('.backbtn').parentElement;
      actionsDiv.style.display='none';
      canvas=await html2canvas(target,{
        backgroundColor:theme==='dark'?'#04040e':'#eeeef5',
        scale:2,useCORS:true,logging:false
      });
      actionsDiv.style.display='flex';
    }

    btn.innerHTML=originalHTML;

    const shareText=`🎵 Mon score ZenHertz : ${lastBpm} BPM / ${lastHz} Hz ! Viens tester comment ta musique impacte ton corps 👉 https://zenhertz.app`;

    if(typeof navigator.share==='function'){
      const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));
      const file=new File([blob],`ZenHertz_${lastBpm}BPM.png`,{type:'image/png'});
      let shared=false;
      try{
        if(navigator.canShare&&navigator.canShare({files:[file]})){
          await navigator.share({title:'ZenHertz',text:shareText,files:[file]});
          shared=true;
        }
      }catch(e){if(e.name==='AbortError'){return;}}
      if(!shared){
        try{
          await navigator.share({title:'ZenHertz',text:shareText});
          shared=true;
        }catch(e){if(e.name==='AbortError'){return;}}
      }
      if(shared)return;
    }

    // Fallback téléchargement
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/png');
    a.download=`ZenHertz_Bilan_${lastBpm}BPM.png`;
    a.click();

  }catch(err){
    console.error(err);
    btn.innerHTML=originalHTML;
    alert('Erreur lors de la capture de l\'image.');
  }
}
